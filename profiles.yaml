# 실행 프로필: model / beam / threads / split / overlap / compute_type
# compute_type 은 faster-whisper(ctranslate2) 인자 — CPU에서 int8, Apple Silicon에서 float16 등
#
# 우선순위(앱): 고급 옵션 명시 > 이 파일 > 환경변수 WHISPER_* > 코드 기본값

# 사무실(Windows CPU, Gram 등): int8 + full + threads 6~8 권장
Balanced Default:
  model_size: small
  beam_size: 1
  cpu_threads: 6
  split_mode: full
  overlap_seconds: 0.0
  compute_type: int8

Long Meeting Safe:
  model_size: small
  beam_size: 1
  cpu_threads: 6
  split_mode: vad
  overlap_seconds: 0.0
  compute_type: int8

Fast Laptop:
  model_size: base
  beam_size: 1
  cpu_threads: 6
  split_mode: full
  overlap_seconds: 0.0
  compute_type: int8

# 집 M3 Mac: float16(또는 int8_float16) + full 시험용
Home M3:
  model_size: small
  beam_size: 1
  cpu_threads: 6
  split_mode: full
  overlap_seconds: 0.0
  compute_type: float16

# 사무실 Gram(Windows): threads 6~8 중간값 예시
Office Gram Windows:
  model_size: small
  beam_size: 1
  cpu_threads: 8
  split_mode: full
  overlap_seconds: 0.0
  compute_type: int8

# 품질 실험: medium + int8 (메모리 여유 시)
High Quality Medium:
  model_size: medium
  beam_size: 1
  cpu_threads: 6
  split_mode: vad
  overlap_seconds: 0.0
  compute_type: int8
